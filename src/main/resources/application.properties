spring.application.name=capstone
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.error.include-stacktrace=ALWAYS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
jwt-secret=${JWT_SECRET}
jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.mail.from=${MAIL_FROM:noreply@gmail.com}
app.verification.token-expiry-hours=${VERIFICATION_TOKEN_EXPIRY_HOURS:24}
app.password-reset.token-expiry-hours=${PASSWORD_RESET_EXPIRY_HOURS:1}
app.verification.base-url=${VERIFICATION_BASE_URL:http://localhost:8080}
app.password-reset.base-url=${PASSWORD_RESET_BASE_URL:http://localhost:8080}
app.auth.default-role-id=${DEFAULT_ROLE_ID:2}
app.password-history.check-recent-count=${RESET_PASSWORD_COUNT:10}
spring.mail.username=${MAILER_USERNAME}
spring.mail.password=${MAILER_PASSWORD}
app.upload.path:./uploads