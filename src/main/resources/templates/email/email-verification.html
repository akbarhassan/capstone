<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1>Verify Your Email</h1>
    <p>Hello <span th:text="${email}">User</span>,</p>
    <p>Please click the button below to verify your email address:</p>

    <a th:href="${verificationLink}"
       style="display: inline-block; padding: 12px 24px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; margin: 20px 0;">
        Verify Email
    </a>

    <p style="color: #777; font-size: 14px;">
        This link will expire in <span th:text="${expiryHours}">24</span> hours.
    </p>

    <p style="color: #777; font-size: 12px;">
        If you didn't create an account, please ignore this email.
    </p>
</div>
</body>
</html>
