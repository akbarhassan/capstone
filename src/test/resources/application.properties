# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT config for tests
jwt.secret=testSecretKeyForUnitTestingPurposesOnlyMustBeLongEnough123456
jwt.expiration=3600000

# Disable mail during tests
spring.mail.host=localhost
spring.mail.port=3025

# Upload path for tests
app.upload.path=./test-uploads

# Token expiry
app.token.verification.expiry-hours=24
app.token.reset.expiry-hours=1
